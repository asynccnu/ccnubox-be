global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['ccnubox-prometheus:9090']

  # bff 在 8080 端口的 Gin 路由上挂载 /api/v1/metrics
  - job_name: 'ccnubox'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets:
          - 'bff:8080'
    basic_auth:
      username: "root"
      password: "12345678"

  # gRPC 服务的 metrics 走独立 HTTP 端口,
  # 端口由 metricsx 包按"gRPC 端口 + 1000"自动派生,
  # 同时暴露 /metrics 与 /api/v1/metrics 两条路径,任选其一。
  # 举例:
  #   be-classlist_v2  grpc :29084  ->  metrics :30084
  #   be-feed          grpc :29088  ->  metrics :30088
  #   be-grade         grpc :29089  ->  metrics :30089
  - job_name: 'ccnubox-grpc-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'be-classlist_v2:30084'
          - 'be-feed:30088'
          - 'be-grade:30089'

  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - 'ccnubox-node-exporter:9100'
