env: "prod"

server:
  name: "feed"
  grpc:
    addr: "0.0.0.0:19088"
    timeout: 10s

data:
  mysql:
    dsn: "root:password@tcp(localhost:3306)/ccnubox?charset=utf8mb4&parseTime=True&loc=Local"
  redis:
    addr: "localhost:6379"
    password: ""
  kafka:
    brokers:
      - "localhost:9092"
  etcd:
    endpoints:
      - "localhost:2379"
    username: "root"
    password: ""

registry:
  etcd:
    addr: "localhost:2379"
    username: "root"
    password: ""

consume:
  consumeTime: 1       # 强制插入的时间(分钟)
  consumeNum: 100      # 批量存入条数上限

holidayController:
  durationTime: 24     # 检查周期(小时)
  advanceDay: 4        # 提前提醒天数

muxiController:
  durationTime: 1      # 定时任务扫描间隔(秒)

jpush:
  appKey: ""
  masterSecret: ""

log:
  path: "/logs/app.log"
  maxSize: 100
  maxBackups: 7
  maxAge: 30
  compress: 1

otel:
  serviceName: "be-feed"
  serviceVersion: "1.0.0"
  endpoint: "localhost:4318"