syntax = "proto3";

package library.v1;

option go_package = "github.com/asynccnu/ccnubox-be/common/api/gen/proto/library/v1;libraryv1";

service Library {
    rpc GetSeat (GetSeatRequest) returns (GetSeatResponse);
    rpc ReserveSeat (ReserveSeatRequest) returns (ReserveSeatResponse);
    rpc GetSeatRecord (GetSeatRecordRequest) returns (GetSeatRecordResponse);
    rpc GetCreditPoint (GetCreditPointRequest) returns (GetCreditPointResponse);
    rpc GetDiscussion (GetDiscussionRequest) returns (GetDiscussionResponse);
    rpc SearchUser (SearchUserRequest) returns (SearchUserResponse);
    rpc ReserveDiscussion (ReserveDiscussionRequest) returns (ReserveDiscussionResponse);
    rpc CancelReserve (CancelReserveRequest) returns (CancelReserveResponse);
    rpc ReserveSeatRandomly (ReserveSeatRandomlyRequest) returns (ReserveSeatRandomlyResponse);
    rpc CreateComment (CreateCommentReq) returns (Resp);
    rpc GetComments (ID) returns (GetCommentResp);
    rpc DeleteComment (ID) returns (Resp);
}

// 获取座位信息
message GetSeatRequest {
    string stu_id = 1;
    repeated string room_ids = 2;
}

message GetSeatResponse {
    repeated RoomSeat room_seats = 1;
}

message RoomSeat {
    string room_id = 1;
    repeated Seat seats = 2;
}

message Seat {
  string ID=1;
  string Label=2;
  string Name=3;
  string Status=4;
  bool AfterFree=5;
  repeated FreeTime FreeList=6;
}

message FreeTime{
  string start=1;
  string end=2;
}

message TimeSlot {
    string start = 1;
    string end = 2;
    string state = 3;
    string owner = 4;
    bool occupy= 5;
}

// 预约座位
message ReserveSeatRequest {
    string dev_id = 1;
    string start = 2;
    string end = 3;
    string stu_id = 4;
}

message ReserveSeatResponse {
    string message = 1;
}

// 获取预约记录
message GetSeatRecordRequest {
    string stu_id = 1;
    repeated string date=2;
}

message GetSeatRecordResponse {
    repeated Record record = 1;
}

message Record {
    string id = 1;
    string room_id = 2;
    string room_name = 3;
    string build_name=4;
    string floor_name=5;
    string seat_id=6;
    string seat_label=7;
    string make_begin=8;
    string make_end=9;
    string make_date=10;
    string status=11;
    string message=12;
}


// 获取信誉分
message GetCreditPointRequest{
    string stu_id = 1;
}

message GetCreditPointResponse{
    CreditSummary credit_summary = 1;
    repeated CreditRecord credit_record = 2;
}

message CreditSummary{
    string system = 1;
    string remain = 2;
    string total = 3;
}

message CreditRecord{
    string title = 1;
    string subtitle = 2;
    string location = 3;
}

// 获取研讨间信息
message GetDiscussionRequest{
    string room_type = 1;
    string date = 2;
    string stu_id = 3;
    string venue_id=4;
}

message GetDiscussionResponse{
    repeated Discussion discussions = 1;
}

message Discussion{
    string room_id = 1;
    string name = 2;
    string venue_id=3;
    string roomType = 4;
    string address = 5;
    repeated DisableTime DisableList = 6;
}

message DisableTime{
    string start = 1;
    string end = 2;
}

// 查找用户
message SearchUserRequest{
    string student_id = 1;
    string stu_id = 2;
}

message SearchUserResponse{
    string id = 1;
    string pid = 2;
    string name = 3;
    string label = 4;
}

// 预约研讨间
message ReserveDiscussionRequest{
    string dev_id = 1;
    string lab_id = 2;
    string kind_id = 3;
    string title = 4;
    string start = 5;
    string end = 6;
    repeated string list = 7;
    string stu_id = 8;
}

message ReserveDiscussionResponse{
    string message = 1;
}

// 取消预约
message CancelReserveRequest{
    string id = 1;
    string stu_id = 2;
}

message CancelReserveResponse{
    string message = 1;
}

// 随机选座
message ReserveSeatRandomlyRequest {
    string start = 1;
    string end = 2;
    string stu_id = 3;
    repeated string room_id = 4;
}

message ReserveSeatRandomlyResponse {
    string message = 1;
}

// 评论
message Comment {
    int64 id = 1;
    string seat_id = 2;
    string username = 3;
    string content = 4;
    int64 rating = 5;
    string created_at = 6;
}


message CreateCommentReq {
    string seat_id = 1;
    string username = 2;
    string content = 3;
    int64 rating = 4;
}

message GetCommentResp {
    repeated Comment Comment = 1;
}

// 通用ID项
message ID {
    int64 id = 1;
}

// 通用消息项
message Resp {
    string message = 1;
}

