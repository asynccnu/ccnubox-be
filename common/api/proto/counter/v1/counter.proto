syntax = "proto3";

package counter.v1;

option go_package="github.com/asynccnu/ccnubox-be/common/api/gen/proto/counter/v1;counterv1";

service CounterService {
  rpc AddCounter(AddCounterReq) returns (AddCounterResp);
  rpc GetCounterLevels(GetCounterLevelsReq) returns (GetCounterLevelsResp);
  rpc RebuildCounter(RebuildCounterReq) returns (RebuildCounterResp);
  rpc DecayCounter(DecayCounterReq) returns (DecayCounterResp);
  rpc BoostScores(BoostScoresReq) returns (BoostScoresResp); // 为指定学生提升20%综合活跃度
}

message AddCounterReq {
  string studentId = 1;
}

message AddCounterResp {}

message GetCounterLevelsReq {
  string label = 1;
}

message GetCounterLevelsResp {
  repeated string studentIds = 1;
}

message RebuildCounterReq {}

message RebuildCounterResp {}

message DecayCounterReq {
  repeated string studentIds = 1;
}

message DecayCounterResp {}

message BoostScoresReq {
  repeated string studentIds = 1;
}

message BoostScoresResp {}