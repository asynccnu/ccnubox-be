env: "prod"

server:
  name: "grade"
  grpc:
    addr: "0.0.0.0:19089"
    timeout: 10s

data:
  mysql:
    dsn: "root:password@tcp(localhost:3306)/ccnubox?charset=utf8mb4&parseTime=True&loc=Local"
  redis:
    addr: "localhost:6379"
    password: ""
  kafka:
    brokers:
      - "localhost:9092"
  etcd:
    endpoints:
      - "localhost:2379"
    username: "root"
    password: ""

registry:
  etcd:
    addr: "localhost:2379"
    username: "root"
    password: ""

gradeConf:
  high: 15      # 高优先级刷新间隔(分钟)
  middle: 30    # 中优先级刷新间隔(分钟)
  low: 60       # 低优先级刷新间隔(分钟)

consumeConf:
  consumeTime: 1   # 强制插入的时间(分钟)
  consumeNum: 100  # 批量存入条数上限

log:
  path: "/logs/app.log"
  maxSize: 100
  maxBackups: 7
  maxAge: 30
  compress: 1

otel:
  serviceName: "be-grade"
  serviceVersion: "1.0.0"
  endpoint: "localhost:4318"